# Generates github-metrics.svg in the repo root and commits it back.
# The README references the file directly so the image is served from
# raw.githubusercontent.com — no third-party host that can 503.
#
# Runs:
#   - On a weekly schedule (Sundays 01:30 UTC)
#   - On every push to main (so README/workflow tweaks take effect immediately)
#   - On manual dispatch (one-click run from the Actions tab)
#
# Token notes:
#   The default GITHUB_TOKEN is enough for everything below. If you create a
#   personal access token (classic) with scopes `repo, read:org, read:user,
#   read:packages` and store it as the secret `METRICS_TOKEN`, the workflow
#   will pick it up automatically and unlock richer plugins (private contrib
#   counts, follow-up stats, traffic, etc.).

name: Metrics

on:
  schedule:
    - cron: "30 1 * * 0"
  push:
    branches: [main]
    paths:
      - ".github/workflows/metrics.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate base metrics card
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: hamzaziizzz
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_timezone: Asia/Kolkata
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, makefile, dockerfile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_topics: yes
          plugin_topics_mode: mastered
          plugin_topics_limit: 15
